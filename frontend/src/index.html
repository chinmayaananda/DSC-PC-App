<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PDF Toolbox — Offline DSC signing, redaction, and stamping for Windows" />
  <title>PDF Toolbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <!-- Custom title bar drag region -->
  <div id="titlebar">
    <div id="titlebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>PDF Toolbox</span>
    </div>
    <div id="titlebar-status">
      <div id="token-indicator" class="token-disconnected">
        <span class="token-dot"></span>
        <span id="token-label">No DSC Token</span>
      </div>
    </div>
  </div>

  <!-- App layout -->
  <div id="app-layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div id="nav-items">
        <button class="nav-btn active" data-page="sign" id="nav-sign" title="Sign PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22h6a2 2 0 002-2V7l-5-5H6a2 2 0 00-2 2v3"/>
            <path d="M14 2v4a2 2 0 002 2h4"/>
            <path d="M3 15l6.5 6.5L17 14"/>
          </svg>
          <span>Sign</span>
        </button>
        <button class="nav-btn" data-page="redact" id="nav-redact" title="Redact PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
          </svg>
          <span>Redact</span>
        </button>
        <button class="nav-btn" data-page="stamp" id="nav-stamp" title="Add Stamp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="5"/>
            <path d="M20 21a8 8 0 10-16 0"/>
            <line x1="12" y1="13" x2="12" y2="21"/>
          </svg>
          <span>Stamp</span>
        </button>
      </div>

      <div id="nav-bottom">
        <button class="nav-btn" data-page="settings" id="nav-settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
          </svg>
          <span>Settings</span>
        </button>
        <button id="theme-toggle" title="Toggle theme">
          <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main-content">
      <div id="page-sign" class="page active"></div>
      <div id="page-redact" class="page"></div>
      <div id="page-stamp" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>

  <!-- PIN Modal (for signing) -->
  <div id="pin-modal" class="modal-overlay hidden">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pin-modal-title">
      <div class="modal-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <h2 id="pin-modal-title">Enter DSC PIN</h2>
      </div>
      <p class="modal-subtitle">Your PIN is used only to sign this document and is never stored.</p>
      <div class="form-group">
        <label for="pin-input">Token PIN</label>
        <input type="password" id="pin-input" placeholder="Enter PIN" autocomplete="off" spellcheck="false" />
      </div>
      <div class="modal-actions">
        <button id="pin-cancel" class="btn-secondary">Cancel</button>
        <button id="pin-confirm" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M12 22h6a2 2 0 002-2V7l-5-5H6a2 2 0 00-2 2v3"/>
            <path d="M14 2v4a2 2 0 002 2h4"/>
            <path d="M3 15l6.5 6.5L17 14"/>
          </svg>
          Sign Document
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="pdf-viewer.js"></script>
  <script src="pages/sign.js"></script>
  <script src="pages/redact.js"></script>
  <script src="pages/stamp.js"></script>
  <script src="pages/settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
